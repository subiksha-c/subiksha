<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            background-color: #333;
            padding: 15px;
            color: white;
        }

        nav .logo {
            font-weight: bold;
            font-size: 18px;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
        }

        nav ul li a:hover {
            color: yellow;
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 40px;
        }

        .hero p {
            font-size: 18px;
        }

        .hero button {
            padding: 10px 20px;
            margin-top: 15px;
            border: none;
            background-color: orange;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        .hero button:hover {
            background-color: darkorange;
        }

        /* Features */
        .features {
            display: flex;
            justify-content: space-around;
            padding: 30px;
            background-color: #f4f4f4;
        }

        .feature-box {
            width: 30%;
            text-align: center;
        }

        /* Footer */
        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">MyBrand</div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div>
            <h1>Welcome to My Website</h1>
            <p>Create amazing websites easily</p>
            <button>Get Started</button>
        </div>
    </section>

    <section class="features">
        <div class="feature-box">
            <h3>Fast</h3>
            <p>Quick and responsive design</p>
        </div>

        <div class="feature-box">
            <h3>Easy</h3>
            <p>Beginner-friendly layout</p>
        </div>

        <div class="feature-box">
            <h3>Modern</h3>
            <p>Clean and stylish UI</p>
        </div>
    </section>

    <footer>
        <p>© 2026 MyBrand. All Rights Reserved.</p>
    </footer>

</body>
</html>
